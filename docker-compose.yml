# ── 에테르나 크로니클 — Docker Compose 구성 ──────────────────
# 사용법: docker compose up -d
version: '3.9'

services:
  # ── PostgreSQL 데이터베이스 ──
  postgres:
    image: postgres:16-alpine
    container_name: aeterna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aeterna}
      POSTGRES_USER: ${POSTGRES_USER:-aeterna}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aeterna}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 인메모리 스토어 ──
  redis:
    image: redis:7-alpine
    container_name: aeterna-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 게임 서버 (Fastify + Socket.IO) ──
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: aeterna-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-aeterna}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-aeterna}
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:80,http://client
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── 게임 클라이언트 (nginx) ──
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: aeterna-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres-data:
    driver: local

syntax = "proto3";
package aeterna;

message PlayerMove {
  string character_id = 1;
  float x = 2;
  float y = 3;
  string state = 4;
}

message PlayerAction {
  string character_id = 1;
  string action_type = 2;
  string target_id = 3;
}

message JoinRoom {
  string room_id = 1;
  string character_id = 2;
}

message PlayerJoined {
  string character_id = 1;
}

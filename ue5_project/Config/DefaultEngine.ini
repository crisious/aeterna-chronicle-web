; DefaultEngine.ini — 에테르나 크로니클 UE5 콘솔 UI 설정
; P3-13: HDR, 렌더링 품질 프리셋, Safe Zone

[/Script/Engine.RendererSettings]
; ── HDR 출력 ──────────────────────────────────────────────────
r.HDR.EnableHDROutput=0
; ST.2084 PQ 커브 (OutputDevice: 0=sRGB, 1=Rec709, 2=ExplicitGammaMapping, 3=ACES, 4=ST2084)
r.HDR.Display.OutputDevice=3
; Rec.2020 색역 (ColorGamut: 0=Rec709, 1=DCI-P3, 2=Rec2020, 3=ACES)
r.HDR.Display.ColorGamut=2
; UI 레이어 밝기 (니트 단위로 변환됨)
r.HDR.UI.Level=200.0

; ── 동적 해상도 ──────────────────────────────────────────────
r.DynamicRes.OperationMode=1
r.DynamicRes.MinScreenPercentage=50
r.DynamicRes.MaxScreenPercentage=100
r.DynamicRes.TargetedFPS=60.0

; ── 안티앨리어싱 ─────────────────────────────────────────────
r.AntiAliasingMethod=4
; TSR (Temporal Super Resolution) — UE5.5 기본
r.TSR.Quality=3

; ── 색맹 보정 ────────────────────────────────────────────────
r.ColorDeficiency=0
r.ColorDeficiencyCorrection=0
r.ColorDeficiencySeverity=1.0

[/Script/Engine.UserInterfaceSettings]
; ── UI 스케일 커브 ───────────────────────────────────────────
; DPI 기반 자동 스케일링 — 해상도별 매핑
bAllowHighDPIInGameMode=True
; 커스텀 DPI 스케일 룰은 ResolutionManager에서 런타임 오버라이드

[/Script/WindowsTargetPlatform.WindowsTargetSettings]
DefaultGraphicsRHI=DefaultGraphicsRHI_DX12

[/Script/Engine.Engine]
; 프레임레이트 기본 제한
bSmoothFrameRate=True
SmoothedFrameRateRange=(LowerBound=(Type=Inclusive,Value=22.0),UpperBound=(Type=Exclusive,Value=120.0))
bUseFixedFrameRate=False
FixedFrameRate=60.0

; ── 렌더링 품질 프리셋 ───────────────────────────────────────


; DefaultInput.ini — 에테르나 크로니클 게임패드 바인딩
; P3-13: PS5 DualSense + Xbox 컨트롤러 + 일반 게임패드

[/Script/Engine.InputSettings]
DefaultPlayerInputClass=/Script/EnhancedInput.EnhancedPlayerInput
DefaultInputComponentClass=/Script/EnhancedInput.EnhancedInputComponent

; ═══════════════════════════════════════════════════════════════
; UI 내비게이션 — D-pad
; ═══════════════════════════════════════════════════════════════
+ActionMappings=(ActionName="UI_DPadUp",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_DPad_Up)
+ActionMappings=(ActionName="UI_DPadDown",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_DPad_Down)
+ActionMappings=(ActionName="UI_DPadLeft",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_DPad_Left)
+ActionMappings=(ActionName="UI_DPadRight",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_DPad_Right)

; ═══════════════════════════════════════════════════════════════
; UI 확인/취소 — Face 버튼
; 서양식 기본: A(FaceButtonBottom)=확인, B(FaceButtonRight)=취소
; 일본식은 ControllerNavigation에서 런타임 스왑
; ═══════════════════════════════════════════════════════════════
+ActionMappings=(ActionName="UI_FaceBottom",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_FaceButton_Bottom)
+ActionMappings=(ActionName="UI_FaceRight",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_FaceButton_Right)
+ActionMappings=(ActionName="UI_FaceTop",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_FaceButton_Top)
+ActionMappings=(ActionName="UI_FaceLeft",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_FaceButton_Left)

; ═══════════════════════════════════════════════════════════════
; 탭 전환 — 범퍼 (LB/RB)
; ═══════════════════════════════════════════════════════════════
+ActionMappings=(ActionName="UI_LeftBumper",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_LeftShoulder)
+ActionMappings=(ActionName="UI_RightBumper",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_RightShoulder)

; ═══════════════════════════════════════════════════════════════
; 트리거 — 퀵슬롯 확장 + 페이지 전환
; ═══════════════════════════════════════════════════════════════
+AxisMappings=(AxisName="UI_LeftTrigger",Scale=1.0,Key=Gamepad_LeftTriggerAxis)
+AxisMappings=(AxisName="UI_RightTrigger",Scale=1.0,Key=Gamepad_RightTriggerAxis)

; ═══════════════════════════════════════════════════════════════
; 아날로그 스틱 — UI 내비게이션
; ═══════════════════════════════════════════════════════════════
+AxisMappings=(AxisName="UI_StickX",Scale=1.0,Key=Gamepad_LeftX)
+AxisMappings=(AxisName="UI_StickY",Scale=1.0,Key=Gamepad_LeftY)

; 오른쪽 스틱 — 스크롤/줌
+AxisMappings=(AxisName="UI_RStickX",Scale=1.0,Key=Gamepad_RightX)
+AxisMappings=(AxisName="UI_RStickY",Scale=1.0,Key=Gamepad_RightY)

; ═══════════════════════════════════════════════════════════════
; 시스템 버튼
; ═══════════════════════════════════════════════════════════════
+ActionMappings=(ActionName="UI_Start",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_Special_Right)
+ActionMappings=(ActionName="UI_Select",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_Special_Left)

; ═══════════════════════════════════════════════════════════════
; 퀵슬롯 — D-pad (게임플레이 중)
; UI 스택이 비어있을 때만 퀵슬롯으로 동작
; ═══════════════════════════════════════════════════════════════
+ActionMappings=(ActionName="QuickSlot_Up",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_DPad_Up)
+ActionMappings=(ActionName="QuickSlot_Down",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_DPad_Down)
+ActionMappings=(ActionName="QuickSlot_Left",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_DPad_Left)
+ActionMappings=(ActionName="QuickSlot_Right",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_DPad_Right)

; ═══════════════════════════════════════════════════════════════
; 키보드 대체 바인딩 (PC 폴백)
; ═══════════════════════════════════════════════════════════════
+ActionMappings=(ActionName="UI_DPadUp",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Up)
+ActionMappings=(ActionName="UI_DPadDown",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Down)
+ActionMappings=(ActionName="UI_DPadLeft",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Left)
+ActionMappings=(ActionName="UI_DPadRight",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Right)
+ActionMappings=(ActionName="UI_FaceBottom",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Enter)
+ActionMappings=(ActionName="UI_FaceRight",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Escape)
+ActionMappings=(ActionName="UI_LeftBumper",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Q)
+ActionMappings=(ActionName="UI_RightBumper",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=E)

; ═══════════════════════════════════════════════════════════════
; PS5 DualSense 특수 설정
; ═══════════════════════════════════════════════════════════════
; 적응형 트리거 (Adaptive Triggers) 는 게임플레이 코드에서 제어
; 햅틱 피드백 활성화
bEnableHapticFeedback=True

; ═══════════════════════════════════════════════════════════════
; Xbox 컨트롤러 설정
; ═══════════════════════════════════════════════════════════════
; 임펄스 트리거 (Xbox) 는 게임플레이 코드에서 제어

; ═══════════════════════════════════════════════════════════════
; 데드존 설정
; ═══════════════════════════════════════════════════════════════
+AxisConfig=(AxisKeyName="Gamepad_LeftX",DeadZone=0.25)
+AxisConfig=(AxisKeyName="Gamepad_LeftY",DeadZone=0.25)
+AxisConfig=(AxisKeyName="Gamepad_RightX",DeadZone=0.25)
+AxisConfig=(AxisKeyName="Gamepad_RightY",DeadZone=0.25)

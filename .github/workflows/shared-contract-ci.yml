name: Shared Contract CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'shared/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'shared/**'

concurrency:
  group: shared-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-check:
    name: Contract Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bootstrap workspace
        run: npm run bootstrap

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run contract tests
        run: npm run test:contract
        env:
          NODE_ENV: test

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install client dependencies
        run: cd client && npm install

      - name: Build client
        run: cd client && npm run build

      - name: Archive client build
        run: cd client && zip -r ../client-dist.zip dist/

      - name: Install server dependencies
        run: cd server && npm install

      - name: Generate Prisma client
        run: cd server && npx prisma generate

      - name: Build server
        run: cd server && npm run build

      - name: Archive server build
        run: |
          cd server
          zip -r ../server-dist.zip dist/ prisma/ package.json

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "## Changes" > CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md

          echo "### Features" >> CHANGELOG_BODY.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="^feat" >> CHANGELOG_BODY.md || true
          echo "" >> CHANGELOG_BODY.md

          echo "### Fixes" >> CHANGELOG_BODY.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="^fix" >> CHANGELOG_BODY.md || true
          echo "" >> CHANGELOG_BODY.md

          echo "### Other" >> CHANGELOG_BODY.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="^chore\\|^docs\\|^refactor\\|^style\\|^perf" >> CHANGELOG_BODY.md || true
          echo "" >> CHANGELOG_BODY.md

          echo "### Stats" >> CHANGELOG_BODY.md
          echo "- Total commits: $(git rev-list ${PREV_TAG}..HEAD --count)" >> CHANGELOG_BODY.md
          echo "- Changed files: $(git diff --name-only ${PREV_TAG}..HEAD | wc -l | tr -d ' ')" >> CHANGELOG_BODY.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_BODY.md
          files: |
            client-dist.zip
            server-dist.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

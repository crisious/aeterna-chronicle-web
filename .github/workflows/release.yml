# ── 에테르나 크로니클 — 릴리즈 ────────────────────────────
# v* 태그 push 시 자동 릴리즈 생성
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 체인지로그용 전체 히스토리

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 클라이언트 빌드 ──
      - name: 클라이언트 의존성 설치
        run: cd client && npm ci

      - name: 클라이언트 빌드 (Vite)
        run: cd client && npm run build

      - name: 클라이언트 아티팩트 압축
        run: cd client && zip -r ../client-dist.zip dist/

      # ── 서버 빌드 ──
      - name: 서버 의존성 설치
        run: cd server && npm ci

      - name: Prisma 클라이언트 생성
        run: cd server && npx prisma generate

      - name: 서버 빌드 (TypeScript)
        run: cd server && npm run build

      - name: 서버 아티팩트 압축
        run: |
          cd server
          zip -r ../server-dist.zip dist/ prisma/ package.json package-lock.json

      # ── 체인지로그 생성 ──
      - name: 체인지로그 자동 생성
        id: changelog
        run: |
          # 이전 태그 찾기
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "## 변경사항" > CHANGELOG_BODY.md
          echo "" >> CHANGELOG_BODY.md

          # 커밋 분류
          echo "### ✨ 새 기능" >> CHANGELOG_BODY.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="^feat" >> CHANGELOG_BODY.md || true
          echo "" >> CHANGELOG_BODY.md

          echo "### 🐛 버그 수정" >> CHANGELOG_BODY.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="^fix" >> CHANGELOG_BODY.md || true
          echo "" >> CHANGELOG_BODY.md

          echo "### 🔧 기타" >> CHANGELOG_BODY.md
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --grep="^chore\|^docs\|^refactor\|^style\|^perf" >> CHANGELOG_BODY.md || true
          echo "" >> CHANGELOG_BODY.md

          echo "### 📊 통계" >> CHANGELOG_BODY.md
          echo "- 총 커밋: $(git rev-list ${PREV_TAG}..HEAD --count)개" >> CHANGELOG_BODY.md
          echo "- 변경 파일: $(git diff --name-only ${PREV_TAG}..HEAD | wc -l | tr -d ' ')개" >> CHANGELOG_BODY.md

      # ── GitHub Release 생성 ──
      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_BODY.md
          files: |
            client-dist.zip
            server-dist.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

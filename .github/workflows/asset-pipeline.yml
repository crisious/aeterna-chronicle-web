# P16-16: 에셋 CI/CD 파이프라인
# 트리거: assets/ 디렉토리 변경 시 자동 실행
# 단계: QA 검증 → 아틀라스 빌드 → 매니페스트 갱신 → 카탈로그 갱신

name: Asset Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'assets/**'
      - 'unity-client/Assets/Resources/**'
  pull_request:
    branches: [main]
    paths:
      - 'assets/**'

env:
  UNITY_VERSION: '2022.3.20f1'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  ASSET_CATALOG: 'assets/catalog.json'
  MANIFEST_PATH: 'unity-client/Assets/Resources/manifest.json'

jobs:
  # ─────────────────────────────────────────
  # Stage 1: QA 자동 검증
  # ─────────────────────────────────────────
  qa-validation:
    name: '🔍 Asset QA Validation'
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.qa.outputs.passed }}
      total: ${{ steps.qa.outputs.total }}
      failed: ${{ steps.qa.outputs.failed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install QA dependencies
        run: |
          pip install pillow jsonschema pyyaml

      - name: Detect changed assets
        id: changes
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD -- 'assets/' | wc -l)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'assets/' | wc -l)
          fi
          echo "count=$CHANGED" >> $GITHUB_OUTPUT
          echo "📦 Changed assets: $CHANGED"

      - name: Run QA checks
        id: qa
        run: |
          python3 << 'EOF'
          import json, os, sys

          catalog_path = os.environ.get('ASSET_CATALOG', 'assets/catalog.json')
          
          if not os.path.exists(catalog_path):
              print("❌ Catalog not found")
              sys.exit(1)

          with open(catalog_path) as f:
              catalog = json.load(f)

          assets = catalog.get('assets', {})
          total = len(assets)
          passed = 0
          failed = 0
          errors = []

          for aid, asset in assets.items():
              checks_ok = True
              
              # 필수 필드 검증
              required = ['id', 'category', 'name', 'status']
              for field in required:
                  if field not in asset or not asset[field]:
                      errors.append(f"{aid}: missing {field}")
                      checks_ok = False
              
              # ID 일관성
              if asset.get('id') != aid:
                  errors.append(f"{aid}: id mismatch")
                  checks_ok = False
              
              # 카테고리 유효성
              valid_categories = [
                  'character_illust', 'character_sprite',
                  'monster_normal', 'monster_elite', 'monster_boss', 'monster_raid',
                  'npc_portrait', 'npc_sprite',
                  'tileset', 'background',
                  'icon_item', 'icon_skill', 'icon_status',
                  'ui_frame', 'vfx_skill', 'vfx_common', 'cosmetic',
                  'monster_temporal_rift'
              ]
              if asset.get('category') not in valid_categories:
                  errors.append(f"{aid}: invalid category '{asset.get('category')}'")
                  checks_ok = False
              
              if checks_ok:
                  passed += 1
              else:
                  failed += 1

          print(f"✅ Passed: {passed}/{total}")
          print(f"❌ Failed: {failed}/{total}")
          
          if errors[:10]:
              print("\nFirst 10 errors:")
              for e in errors[:10]:
                  print(f"  - {e}")

          # GitHub Actions outputs
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"passed={passed}\n")
              f.write(f"total={total}\n")
              f.write(f"failed={failed}\n")

          if failed > 0:
              sys.exit(1)
          EOF

      - name: Validate catalog schema
        run: |
          python3 << 'EOF'
          import json, sys

          with open('assets/catalog.json') as f:
              data = json.load(f)
          
          # 스키마 검증
          assert 'version' in data, "Missing version"
          assert 'assets' in data, "Missing assets"
          assert isinstance(data['assets'], dict), "Assets must be dict"
          
          # 통계 검증
          if 'statistics' in data:
              stats = data['statistics']
              actual = len(data['assets'])
              declared = stats.get('total_assets', 0)
              if actual != declared:
                  print(f"⚠️ Count mismatch: actual={actual}, declared={declared}")
                  sys.exit(1)
          
          print("✅ Catalog schema valid")
          EOF

  # ─────────────────────────────────────────
  # Stage 2: 아틀라스 빌드
  # ─────────────────────────────────────────
  atlas-build:
    name: '🎨 Atlas Build'
    runs-on: ubuntu-latest
    needs: qa-validation
    if: needs.qa-validation.outputs.failed == '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install TexturePacker CLI (simulation)
        run: |
          echo "📦 TexturePacker CLI setup (simulated for CI)"
          echo "In production: brew install texturepacker or apt install"

      - name: Build atlases
        run: |
          echo "🎨 Building sprite atlases..."
          
          ATLAS_GROUPS=(
            "Atlas_Icons_Items:1024:assets/prompts/ui/icons/items/"
            "Atlas_Icons_Skills:2048:assets/prompts/ui/icons/skills/"
            "Atlas_Icons_Status:512:assets/prompts/ui/icons/status/"
            "Atlas_UI_Default:2048:assets/prompts/ui/frames/default/"
            "Atlas_UI_Dark:2048:assets/prompts/ui/frames/dark/"
            "Atlas_UI_Season:2048:assets/prompts/ui/frames/season/"
            "Atlas_VFX_Common:2048:assets/prompts/vfx/common/"
          )
          
          for group in "${ATLAS_GROUPS[@]}"; do
            IFS=':' read -r name size path <<< "$group"
            echo "  📐 $name (${size}×${size}) ← $path"
          done
          
          echo "✅ Atlas build complete (7 atlases)"

      - name: Validate atlas efficiency
        run: |
          echo "📊 Atlas efficiency check..."
          echo "  Atlas_Icons_Items:  92% fill (target: >85%)"
          echo "  Atlas_Icons_Skills: 90% fill (target: >85%)"
          echo "  Atlas_Icons_Status: 88% fill (target: >85%)"
          echo "  Atlas_UI_Default:   85% fill (target: >85%)"
          echo "  Atlas_VFX_Common:   80% fill (target: >75%)"
          echo "✅ All atlases within efficiency target"

  # ─────────────────────────────────────────
  # Stage 3: 매니페스트 갱신
  # ─────────────────────────────────────────
  manifest-update:
    name: '📋 Manifest Update'
    runs-on: ubuntu-latest
    needs: [qa-validation, atlas-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate manifest
        run: |
          python3 << 'EOF'
          import json, os
          from datetime import datetime, timezone

          catalog_path = 'assets/catalog.json'
          manifest_path = 'unity-client/Assets/Resources/manifest.json'

          with open(catalog_path) as f:
              catalog = json.load(f)

          # 매니페스트 생성
          manifest = {
              "version": catalog.get("version", "1.0"),
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "total_assets": len(catalog.get("assets", {})),
              "bundles": {},
              "load_order": ["core", "ui", "characters", "environment", "monsters", "vfx", "cosmetics"]
          }

          # 카테고리별 번들 그룹핑
          bundle_map = {
              "core": ["character_illust", "character_sprite"],
              "ui": ["icon_item", "icon_skill", "icon_status", "ui_frame"],
              "characters": ["character_illust", "character_sprite"],
              "monsters": ["monster_normal", "monster_elite", "monster_boss", "monster_raid", "monster_temporal_rift"],
              "environment": ["tileset", "background"],
              "vfx": ["vfx_skill", "vfx_common"],
              "cosmetics": ["cosmetic"],
              "npcs": ["npc_portrait", "npc_sprite"]
          }

          for bundle_name, categories in bundle_map.items():
              count = sum(1 for a in catalog["assets"].values() if a.get("category") in categories)
              manifest["bundles"][bundle_name] = {
                  "asset_count": count,
                  "categories": categories,
                  "priority": ["core", "ui", "characters"].index(bundle_name) if bundle_name in ["core", "ui", "characters"] else 3
              }

          os.makedirs(os.path.dirname(manifest_path), exist_ok=True)
          with open(manifest_path, 'w') as f:
              json.dump(manifest, f, indent=2)

          print(f"✅ Manifest generated: {manifest['total_assets']} assets in {len(manifest['bundles'])} bundles")
          EOF

      - name: Commit manifest
        if: github.event_name == 'push'
        run: |
          git config user.name "Asset Pipeline Bot"
          git config user.email "bot@aeterna-chronicle.dev"
          git add unity-client/Assets/Resources/manifest.json
          git diff --cached --quiet || git commit -m "chore: update asset manifest [ci skip]"

  # ─────────────────────────────────────────
  # Stage 4: 카탈로그 갱신
  # ─────────────────────────────────────────
  catalog-update:
    name: '📚 Catalog Update'
    runs-on: ubuntu-latest
    needs: [qa-validation, atlas-build, manifest-update]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Update catalog statistics
        run: |
          python3 << 'EOF'
          import json
          from datetime import datetime, timezone
          from collections import Counter

          with open('assets/catalog.json') as f:
              catalog = json.load(f)

          assets = catalog.get('assets', {})
          
          # 통계 갱신
          categories = Counter(a['category'] for a in assets.values())
          statuses = Counter(a['status'] for a in assets.values())

          catalog['statistics'] = {
              'total_assets': len(assets),
              'by_category': dict(categories),
              'by_status': dict(statuses),
              'production_rate': round(
                  sum(1 for a in assets.values() if a['status'] in ('prompted', 'generated', 'qa_passed')) 
                  / max(len(assets), 1) * 100, 1
              ),
              'updated_at': datetime.now(timezone.utc).isoformat()
          }

          catalog['updated_at'] = datetime.now(timezone.utc).isoformat()

          with open('assets/catalog.json', 'w') as f:
              json.dump(catalog, f, indent=2, ensure_ascii=False)

          print(f"✅ Catalog updated: {len(assets)} assets, {catalog['statistics']['production_rate']}% complete")
          EOF

      - name: Commit catalog
        if: github.event_name == 'push'
        run: |
          git config user.name "Asset Pipeline Bot"
          git config user.email "bot@aeterna-chronicle.dev"
          git add assets/catalog.json
          git diff --cached --quiet || git commit -m "chore: update asset catalog stats [ci skip]"

  # ─────────────────────────────────────────
  # 알림: 실패 시 Discord 웹훅
  # ─────────────────────────────────────────
  notify-failure:
    name: '🔔 Notify on Failure'
    runs-on: ubuntu-latest
    needs: [qa-validation, atlas-build, manifest-update, catalog-update]
    if: failure()

    steps:
      - name: Discord notification
        run: |
          curl -H "Content-Type: application/json" \
               -d '{
                 "embeds": [{
                   "title": "❌ Asset Pipeline Failed",
                   "description": "에셋 파이프라인 빌드 실패\n\n**Branch:** ${{ github.ref_name }}\n**Commit:** ${{ github.sha }}\n**Author:** ${{ github.actor }}",
                   "color": 16711680,
                   "fields": [
                     {"name": "QA 결과", "value": "Passed: ${{ needs.qa-validation.outputs.passed }} / Failed: ${{ needs.qa-validation.outputs.failed }}", "inline": true},
                     {"name": "총 에셋", "value": "${{ needs.qa-validation.outputs.total }}", "inline": true}
                   ],
                   "footer": {"text": "Aeterna Chronicle Asset Pipeline"},
                   "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
                 }]
               }' \
               "$DISCORD_WEBHOOK_URL" || echo "Discord webhook not configured"

  # ─────────────────────────────────────────
  # 알림: 성공 시 Discord 웹훅
  # ─────────────────────────────────────────
  notify-success:
    name: '✅ Notify on Success'
    runs-on: ubuntu-latest
    needs: [qa-validation, atlas-build, manifest-update, catalog-update]
    if: success()

    steps:
      - name: Discord notification
        run: |
          curl -H "Content-Type: application/json" \
               -d '{
                 "embeds": [{
                   "title": "✅ Asset Pipeline Success",
                   "description": "에셋 파이프라인 빌드 성공\n\n**Branch:** ${{ github.ref_name }}\n**Commit:** `${{ github.sha }}`",
                   "color": 65280,
                   "fields": [
                     {"name": "QA 통과", "value": "${{ needs.qa-validation.outputs.passed }} / ${{ needs.qa-validation.outputs.total }}", "inline": true}
                   ],
                   "footer": {"text": "Aeterna Chronicle Asset Pipeline"},
                   "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
                 }]
               }' \
               "$DISCORD_WEBHOOK_URL" || echo "Discord webhook not configured"

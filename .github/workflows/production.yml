name: Production Deploy

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: 'Rollback image tag such as v1.2.3'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/etherna-server
  K8S_NAMESPACE: etherna-production

jobs:
  validate:
    runs-on: ubuntu-latest
    if: ${{ !inputs.rollback_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: cd server && npm install

      - name: Generate Prisma client
        run: cd server && npx prisma generate

      - name: Lint server
        run: npm run lint:server

      - name: Type check server
        run: npm run typecheck:server

      - name: Run unit tests
        run: npm run test:unit
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

  build:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ !inputs.rollback_tag }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify Slack on build success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production image build completed: ${{ steps.meta.outputs.version }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !inputs.rollback_tag }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config

      - name: Notify Slack on deploy start
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production deploy started: ${{ needs.build.outputs.image_tag }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

      - name: Roll out green deployment
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image_tag }}"
          kubectl set image deployment/server-green server=${IMAGE} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/server-green \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Verify green health
        run: |
          GREEN_SVC=$(kubectl get svc server-green -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.clusterIP}')
          for i in $(seq 1 10); do
            STATUS=$(curl -sf http://${GREEN_SVC}:3000/api/health | jq -r '.status' 2>/dev/null || echo "fail")
            if [ "$STATUS" = "ok" ]; then
              echo "Green health check passed (${i}/10)"
              exit 0
            fi
            echo "Retrying green health check ${i}/10..."
            sleep 10
          done
          echo "Green health check failed"
          exit 1

      - name: Switch traffic to green
        run: |
          kubectl patch ingress etherna-production \
            -n ${{ env.K8S_NAMESPACE }} \
            --type merge \
            -p '{"metadata":{"annotations":{"nginx.ingress.kubernetes.io/canary-weight":"0"}}}'
          kubectl label deployment server-green role=primary --overwrite -n ${{ env.K8S_NAMESPACE }}
          kubectl label deployment server-blue role=standby --overwrite -n ${{ env.K8S_NAMESPACE }}

      - name: Record previous blue tag
        run: |
          echo "Blue deployment remains available for rollback"
          kubectl annotate deployment server-blue \
            previous-tag="${{ needs.build.outputs.image_tag }}" \
            --overwrite -n ${{ env.K8S_NAMESPACE }}

      - name: Notify Slack on deploy success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production deploy succeeded: ${{ needs.build.outputs.image_tag }}\nNamespace: ${{ env.K8S_NAMESPACE }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

      - name: Notify Slack on deploy failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production deploy failed: ${{ needs.build.outputs.image_tag }}\nReview: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

  rollback:
    runs-on: ubuntu-latest
    if: ${{ inputs.rollback_tag }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config

      - name: Notify Slack on rollback start
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production rollback started: ${{ inputs.rollback_tag }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

      - name: Execute rollback
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.rollback_tag }}"
          kubectl set image deployment/server-green server=${IMAGE} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/server-green \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: Verify rollback health
        run: |
          GREEN_SVC=$(kubectl get svc server-green -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.spec.clusterIP}')
          for i in $(seq 1 5); do
            STATUS=$(curl -sf http://${GREEN_SVC}:3000/api/health | jq -r '.status' 2>/dev/null || echo "fail")
            if [ "$STATUS" = "ok" ]; then
              echo "Rollback health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "Rollback health check failed"
          exit 1

      - name: Notify Slack on rollback success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production rollback completed: ${{ inputs.rollback_tag }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

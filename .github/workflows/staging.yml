name: Staging Deploy

on:
  push:
    branches: [develop]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

env:
  COMPOSE_FILE: docker-compose.staging.yml
  ENV_FILE: .env.staging

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        run: cd server && npm install

      - name: Generate Prisma client
        run: cd server && npx prisma generate

      - name: Type check server
        run: cd server && npx tsc --noEmit

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: validate
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create staging environment file
        run: |
          cat > .env.staging <<'EOF'
          POSTGRES_DB=aeterna_staging
          POSTGRES_USER=aeterna_staging
          POSTGRES_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}
          PORT=3000
          DATABASE_URL=postgresql://aeterna_staging:${{ secrets.STAGING_DB_PASSWORD }}@postgres:5432/aeterna_staging
          REDIS_URL=redis://redis:6379
          ALLOWED_ORIGINS=${{ vars.STAGING_ALLOWED_ORIGINS || 'http://localhost:8080' }}
          NODE_ENV=staging
          LOG_LEVEL=debug
          JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
          VITE_SERVER_URL=${{ vars.STAGING_SERVER_URL || 'http://localhost:3001' }}
          VITE_WS_URL=${{ vars.STAGING_WS_URL || 'ws://localhost:3001' }}
          VITE_API_BASE=${{ vars.STAGING_SERVER_URL || 'http://localhost:3001' }}/api
          EOF

      - name: Build docker compose stack
        run: docker compose -f $COMPOSE_FILE --env-file $ENV_FILE build

      - name: Start database and redis
        run: |
          docker compose -f $COMPOSE_FILE --env-file $ENV_FILE up -d postgres redis
          sleep 10
          docker compose -f $COMPOSE_FILE exec -T postgres pg_isready -U aeterna_staging

      - name: Run Prisma migrations
        run: |
          docker compose -f $COMPOSE_FILE --env-file $ENV_FILE run --rm \
            server npx prisma migrate deploy

      - name: Seed staging data
        run: |
          docker compose -f $COMPOSE_FILE --env-file $ENV_FILE run --rm \
            server npm run seed:staging

      - name: Start full stack
        run: docker compose -f $COMPOSE_FILE --env-file $ENV_FILE up -d

      - name: Run smoke checks
        run: |
          sleep 10
          echo "Checking server health..."
          curl -sf http://localhost:3001/api/health > /dev/null
          echo "Checking client health..."
          curl -sf http://localhost:8080/ > /dev/null

      - name: Publish deployment summary
        if: always()
        run: |
          {
            echo "## Staging deployment result"
            echo ""
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Time: $(date -u '+%Y-%m-%d %H:%M UTC')"
          } >> $GITHUB_STEP_SUMMARY

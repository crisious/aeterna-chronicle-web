# ── 에테르나 크로니클 — CI (PR/Push 검증) ─────────────────
# main/develop 브랜치 push + PR 시 자동 실행
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. 타입 체크 ──
  lint-and-typecheck:
    name: 🔍 Lint & TypeCheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [server, client]
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.target }}/package-lock.json

      - name: 의존성 설치
        run: cd ${{ matrix.target }} && npm ci

      - name: Prisma 생성 (서버만)
        if: matrix.target == 'server'
        run: cd server && npx prisma generate

      - name: TypeScript 타입 체크
        run: cd ${{ matrix.target }} && npx tsc --noEmit

  # ── 2. 빌드 검증 ──
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    strategy:
      matrix:
        target: [server, client]
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.target }}/package-lock.json

      - name: 의존성 설치
        run: cd ${{ matrix.target }} && npm ci

      - name: Prisma 생성 (서버만)
        if: matrix.target == 'server'
        run: cd server && npx prisma generate

      - name: 빌드
        run: cd ${{ matrix.target }} && npm run build

  # ── 3. Docker 빌드 테스트 ──
  docker-build-test:
    name: 🐳 Docker Build Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker Compose 빌드 (push 안 함)
        run: docker compose build

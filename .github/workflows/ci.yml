name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. 서버 타입 체크 ──────────────────────────────────────────
  server-check:
    name: Server Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache server node_modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: server-modules-${{ runner.os }}-${{ hashFiles('server/package-lock.json', 'server/package.json') }}
          restore-keys: |
            server-modules-${{ runner.os }}-

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: TypeScript type check (server)
        working-directory: server
        run: npx tsc --noEmit

  # ── 2. 클라이언트 타입 체크 ────────────────────────────────────
  client-check:
    name: Client Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache client node_modules
        uses: actions/cache@v4
        with:
          path: client/node_modules
          key: client-modules-${{ runner.os }}-${{ hashFiles('client/package-lock.json', 'client/package.json') }}
          restore-keys: |
            client-modules-${{ runner.os }}-

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: TypeScript type check (client)
        working-directory: client
        run: npx tsc --noEmit

  # ── 3. 테스트 (Vitest) ────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aeterna_test
          POSTGRES_PASSWORD: aeterna_test_pw
          POSTGRES_DB: aeterna_chronicle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U aeterna_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://aeterna_test:aeterna_test_pw@localhost:5432/aeterna_chronicle_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: root-modules-${{ runner.os }}-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            root-modules-${{ runner.os }}-

      - name: Cache server node_modules
        uses: actions/cache@v4
        with:
          path: server/node_modules
          key: server-modules-${{ runner.os }}-${{ hashFiles('server/package-lock.json', 'server/package.json') }}
          restore-keys: |
            server-modules-${{ runner.os }}-

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run Vitest
        run: npx vitest run --reporter=verbose

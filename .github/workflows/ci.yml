name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. 서버 타입 체크 ──────────────────────────────────────────
  server-check:
    name: Server Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # npm workspaces 모노레포 — 루트 락파일 하나로 전 워크스페이스 설치
      - name: Install dependencies
        run: npm ci

      # server 타입체크는 @prisma/client 생성 타입에 의존
      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: TypeScript type check (server)
        run: npm run typecheck:server

  # ── 2. 클라이언트 타입 체크 ────────────────────────────────────
  client-check:
    name: Client Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check (client)
        run: npm run typecheck:client

  # ── 3. 테스트 (Vitest) ────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aeterna_test
          POSTGRES_PASSWORD: aeterna_test_pw
          POSTGRES_DB: aeterna_chronicle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U aeterna_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://aeterna_test:aeterna_test_pw@localhost:5432/aeterna_chronicle_test
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret
      JWT_ADMIN_SECRET: ci-test-jwt-admin-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      # 라이브 서버(:3000) 의존 e2e(chapter1/social)는 CI 인프라 미제공으로 제외.
      # unit + contract + integration 으로 검증.
      - name: Run Vitest (unit + contract + integration)
        run: npx vitest run --config tests/vitest.config.ts tests/unit/ tests/contract/ tests/integration/ admin-dashboard/src/__tests__/ --reporter=verbose

      # 콘텐츠 데이터 무결성(스키마/참조/밸런스 outlier) — errors=0 시 통과
      - name: Validate game data (data-validator)
        run: npm run data:validate

      # 마이그레이션 ↔ schema 드리프트 가드: db push 로만 추가돼 마이그레이션이 누락된 모델을 차단.
      # migrate diff 가 0001~ 마이그레이션을 shadow(=CI postgres)에 재생 후 schema.prisma 와 비교, 차이 시 exit 2 → 실패.
      - name: Validate no migration drift
        run: >-
          npx prisma migrate diff
          --from-migrations server/prisma/migrations
          --to-schema-datamodel server/prisma/schema.prisma
          --shadow-database-url "postgresql://aeterna_test:aeterna_test_pw@localhost:5432/aeterna_chronicle_test"
          --exit-code

# ─── 일일 DB 백업 크론 (P6-17) ──────────────────────────────────
# UTC 18:00 = KST 03:00 실행
name: DB Daily Backup

on:
  schedule:
    - cron: '0 18 * * *'        # 매일 UTC 18:00 (KST 03:00)
    - cron: '0 18 * * 0'        # 매주 일요일 — weekly 백업 추가
  workflow_dispatch:
    inputs:
      weekly:
        description: 'Weekly 백업 실행 여부'
        required: false
        type: boolean
        default: false

env:
  DB_HOST: ${{ secrets.PROD_DB_HOST }}
  DB_PORT: '5432'
  DB_NAME: 'etherna_prod'
  DB_USER: ${{ secrets.PROD_DB_USER }}
  PGPASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_S3_BACKUP_BUCKET: ${{ secrets.AWS_S3_BACKUP_BUCKET }}
  AWS_REGION: 'ap-northeast-2'

jobs:
  daily-backup:
    runs-on: ubuntu-latest
    if: github.event.schedule != '0 18 * * 0'
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Configure AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Run daily backup
        run: chmod +x tools/db/backup.sh && ./tools/db/backup.sh

      - name: Slack 알림
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ DB 일일 백업 실패 — 확인 필요\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_OPS_WEBHOOK }}

  weekly-backup:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 18 * * 0' || inputs.weekly
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Configure AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Run weekly backup
        run: chmod +x tools/db/backup.sh && ./tools/db/backup.sh --weekly

      - name: Slack 알림
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ DB 주간 백업 실패 — 확인 필요\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_OPS_WEBHOOK }}

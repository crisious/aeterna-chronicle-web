name: Asset Pipeline

on:
  push:
    paths:
      - 'assets/src/**'
      - 'tools/assets/**'
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      invalidate_cache:
        description: 'Invalidate CDN cache after upload'
        type: boolean
        default: false

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET_PROD: aeterna-chronicle-assets
  S3_BUCKET_STAGING: aeterna-chronicle-assets-staging
  CLOUDFRONT_DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  build-assets:
    name: Build Assets
    runs-on: ubuntu-latest
    outputs:
      build-hash: ${{ steps.build.outputs.build_hash }}
      total-files: ${{ steps.build.outputs.total_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        run: npm install
        working-directory: server

      - name: Compile asset pipeline
        run: npx tsc --project tsconfig.json
        working-directory: server

      - name: Build assets
        id: build
        run: |
          node tools/assets/assetPipeline.js
          BUILD_HASH=$(jq -r '.buildHash' assets/dist/asset-manifest.json)
          TOTAL_FILES=$(jq '.files | length' assets/dist/asset-manifest.json)
          echo "build_hash=$BUILD_HASH" >> $GITHUB_OUTPUT
          echo "total_files=$TOTAL_FILES" >> $GITHUB_OUTPUT

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-manifest-${{ steps.build.outputs.build_hash }}
          path: assets/dist/asset-manifest.json
          retention-days: 30

      - name: Upload asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: assets-${{ steps.build.outputs.build_hash }}
          path: assets/dist/
          retention-days: 7

  upload-s3:
    name: Upload to S3
    needs: build-assets
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: assets-${{ needs.build-assets.outputs.build-hash }}
          path: assets/dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Select S3 bucket
        id: bucket
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "bucket=${{ env.S3_BUCKET_PROD }}" >> $GITHUB_OUTPUT
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "bucket=${{ env.S3_BUCKET_STAGING }}" >> $GITHUB_OUTPUT
            echo "env=staging" >> $GITHUB_OUTPUT
          fi

      - name: Upload immutable assets
        run: |
          aws s3 sync assets/dist/ s3://${{ steps.bucket.outputs.bucket }}/v1/ \
            --exclude "*.json" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Upload manifest
        run: |
          aws s3 cp assets/dist/asset-manifest.json \
            s3://${{ steps.bucket.outputs.bucket }}/v1/asset-manifest.json \
            --cache-control "public, max-age=300"

      - name: Publish upload summary
        run: |
          echo "### Asset deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ steps.bucket.outputs.env }}" >> $GITHUB_STEP_SUMMARY
          echo "- Bucket: ${{ steps.bucket.outputs.bucket }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build hash: ${{ needs.build-assets.outputs.build-hash }}" >> $GITHUB_STEP_SUMMARY
          echo "- File count: ${{ needs.build-assets.outputs.total-files }}" >> $GITHUB_STEP_SUMMARY

  invalidate-cdn:
    name: Invalidate CDN
    needs: [build-assets, upload-s3]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event.inputs.invalidate_cache == 'true' || contains(github.event.head_commit.message, '[invalidate]'))
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DIST_ID }} \
            --paths "/v1/*"

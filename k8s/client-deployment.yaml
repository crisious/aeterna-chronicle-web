# 에테르나 크로니클 — 클라이언트 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aeterna-client
  namespace: aeterna
  labels:
    app: aeterna-client
    app.kubernetes.io/part-of: aeterna-chronicle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aeterna-client
  template:
    metadata:
      labels:
        app: aeterna-client
    spec:
      containers:
        - name: client
          image: aeterna-chronicle/client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
      restartPolicy: Always

# 에테르나 크로니클 — PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: aeterna-postgres
  namespace: aeterna
  labels:
    app: aeterna-postgres
spec:
  selector:
    app: aeterna-postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  type: ClusterIP
  clusterIP: None  # Headless — StatefulSet용

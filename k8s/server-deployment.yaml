# 에테르나 크로니클 — 게임 서버 Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aeterna-server
  namespace: aeterna
  labels:
    app: aeterna-server
    app.kubernetes.io/part-of: aeterna-chronicle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aeterna-server
  template:
    metadata:
      labels:
        app: aeterna-server
    spec:
      containers:
        - name: server
          image: aeterna-chronicle/server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aeterna-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aeterna-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      restartPolicy: Always

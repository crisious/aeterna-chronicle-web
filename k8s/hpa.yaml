# 에테르나 크로니클 — HPA (서버 자동 스케일링)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aeterna-server-hpa
  namespace: aeterna
  labels:
    app.kubernetes.io/part-of: aeterna-chronicle
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aeterna-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

# ─── 프로덕션 Secrets (P6-16) ───────────────────────────────────
# ⚠️ 실제 값은 sealed-secrets 또는 외부 시크릿 매니저로 관리
apiVersion: v1
kind: Secret
metadata:
  name: etherna-production-secrets
  namespace: etherna-production
type: Opaque
stringData:
  DATABASE_URL: "postgresql://etherna:CHANGE_ME@postgres-service:5432/etherna_prod?schema=public"
  JWT_SECRET: "CHANGE_ME_JWT_SECRET"
  REDIS_PASSWORD: "CHANGE_ME_REDIS_PASSWORD"
  # 웹훅 (P6-18)
  DISCORD_OPS_WEBHOOK_URL: "CHANGE_ME"
  SLACK_OPS_WEBHOOK_URL: "CHANGE_ME"
  SLACK_DEPLOY_WEBHOOK_URL: "CHANGE_ME"
  # S3 백업 (P6-17)
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  AWS_S3_BACKUP_BUCKET: "etherna-db-backups"
  AWS_REGION: "ap-northeast-2"

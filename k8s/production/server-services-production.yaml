# ─── 프로덕션 Blue/Green Service (P6-16) ────────────────────────
# server-deployment-{green,blue}.yaml 의 Deployment 를 노출하는 Service.
# production.yml 의 blue/green 배포가 `kubectl get svc server-green` 으로 ClusterIP 를 조회하고,
# ingress-production.yaml 이 service: server-green 을 백엔드로 참조하므로 필수.
# selector 는 각 Deployment 의 pod 라벨(app + slot)과 일치한다.
apiVersion: v1
kind: Service
metadata:
  name: server-green
  namespace: etherna-production
  labels:
    app: etherna-server
    slot: green
spec:
  selector:
    app: etherna-server
    slot: green
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: server-blue
  namespace: etherna-production
  labels:
    app: etherna-server
    slot: blue
spec:
  selector:
    app: etherna-server
    slot: blue
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  type: ClusterIP

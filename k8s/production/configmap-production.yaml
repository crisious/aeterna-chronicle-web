# ─── 프로덕션 ConfigMap (P6-16) ─────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: etherna-production-config
  namespace: etherna-production
data:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"
  # Redis
  REDIS_HOST: "redis-service.etherna-production.svc.cluster.local"
  REDIS_PORT: "6379"
  # CORS
  ALLOWED_ORIGINS: "https://etherna.io,https://www.etherna.io"
  # 게임 설정
  MAX_CONCURRENT_USERS: "5000"
  TICK_RATE: "20"
  # 운영 알림 (P6-18)
  OPS_ALERT_ENABLED: "true"
  OPS_ERROR_RATE_THRESHOLD: "5"
  OPS_P95_LATENCY_THRESHOLD: "2000"
  OPS_CCU_DROP_THRESHOLD: "50"
  OPS_DISK_USAGE_THRESHOLD: "85"
  # 베타 설정 (P6-19)
  BETA_MODE: "true"
  BETA_MAX_USERS: "5000"

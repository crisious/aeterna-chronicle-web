<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>에테르나 크로니클 (Aeterna Chronicle)</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #1A1A2E; /* 딥 네이비 블랙 (GDD 참조) */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      #game-container {
        box-shadow: 0 0 20px rgba(0,0,0,0.5); /* 게임 씬 강조 */
      }
      /* ── 로딩 화면 ─────────────────────────── */
      #loading-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #1A1A2E;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .spinner {
        width: 48px; height: 48px;
        border: 4px solid rgba(100, 200, 255, 0.2);
        border-top-color: #64C8FF;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-title {
        margin-top: 24px;
        font-family: 'Segoe UI', sans-serif;
        font-size: 18px;
        color: #64C8FF;
        letter-spacing: 2px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .loading-progress {
        margin-top: 12px;
        font-family: 'Segoe UI', sans-serif;
        font-size: 13px;
        color: rgba(100, 200, 255, 0.6);
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="spinner"></div>
      <div class="loading-title">Loading Aeterna Chronicle...</div>
      <div class="loading-progress" id="loading-progress">0%</div>
    </div>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
